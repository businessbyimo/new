services:
  - type: web
    name: facebook-personal-bot
    runtime: node
    repo: https://github.com/yourusername/facebook-personal-bot
    plan: free
    envVars:
      - key: APPSTATE
        sync: false
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    numInstances: 1
